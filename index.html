<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SkyDash</title>
<style>
  :root {
    --bg: #0e1a2b;
    --bg2: #16283f;
    --card: rgba(255, 255, 255, 0.06);
    --card-border: rgba(255, 255, 255, 0.10);
    --text: #eef3f8;
    --muted: #93a5ba;
    --accent: #5ec2ff;
    --error: #ff8a80;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    padding: max(20px, env(safe-area-inset-top)) 20px max(28px, env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  main { width: 100%; max-width: 480px; }

  h1 {
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 18px;
  }
  h1 span { color: var(--accent); }

  form {
    display: flex;
    gap: 10px;
    margin-bottom: 22px;
  }
  input[type="text"] {
    flex: 1;
    min-width: 0;
    font-size: 1rem;
    padding: 13px 16px;
    border-radius: 14px;
    border: 1px solid var(--card-border);
    background: var(--card);
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
  }
  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:focus { border-color: var(--accent); }
  button {
    font-size: 1rem;
    font-weight: 600;
    padding: 13px 20px;
    border-radius: 14px;
    border: none;
    background: var(--accent);
    color: #06121f;
    cursor: pointer;
    touch-action: manipulation;
  }
  button:active { transform: scale(0.96); }

  #status {
    text-align: center;
    color: var(--muted);
    font-size: 0.95rem;
    padding: 40px 10px;
    line-height: 1.5;
  }
  #status.error { color: var(--error); }
  #status .spin {
    display: inline-block;
    width: 22px; height: 22px;
    border: 3px solid var(--card-border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: rot 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes rot { to { transform: rotate(360deg); } }

  #dash { display: none; }

  .now {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 22px;
    padding: 28px 24px 24px;
    text-align: center;
    margin-bottom: 16px;
  }
  .now .place {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .now .glyph { font-size: 3.4rem; line-height: 1.2; }
  .now .temp {
    font-size: 4.2rem;
    font-weight: 200;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .now .temp sup { font-size: 1.8rem; font-weight: 300; color: var(--muted); }
  .now .desc { font-size: 1rem; color: var(--muted); margin-top: 4px; }

  .days {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .day {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 14px 4px 12px;
    text-align: center;
  }
  .day .wd {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .day .g { font-size: 1.5rem; margin-bottom: 6px; }
  .day .hi { font-size: 0.92rem; font-weight: 600; }
  .day .lo { font-size: 0.82rem; color: var(--muted); }

  footer {
    margin-top: 24px;
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    opacity: 0.7;
  }
</style>
</head>
<body>
<main>
  <h1>Sky<span>Dash</span></h1>

  <form id="form" autocomplete="off">
    <input type="text" id="city" placeholder="City name (e.g. Berlin)"
           inputmode="text" enterkeyhint="search" aria-label="City name">
    <button type="submit">Go</button>
  </form>

  <div id="status">Type a city above to see the weather.</div>

  <section id="dash" aria-live="polite">
    <div class="now">
      <div class="place" id="place"></div>
      <div class="glyph" id="nowGlyph"></div>
      <div class="temp"><span id="nowTemp"></span><sup>&deg;C</sup></div>
      <div class="desc" id="nowDesc"></div>
    </div>
    <div class="days" id="days"></div>
  </section>

  <footer>Weather data by Open-Meteo.com &middot; no account, no key</footer>
</main>

<script>
(function () {
  "use strict";

  var GEO_URL = "https://geocoding-api.open-meteo.com/v1/search?count=1&language=en&format=json&name=";
  var FC_URL  = "https://api.open-meteo.com/v1/forecast" +
                "?current=temperature_2m,weather_code" +
                "&daily=weather_code,temperature_2m_max,temperature_2m_min" +
                "&timezone=auto&forecast_days=5";
  var STORE_KEY = "skydash.lastCity";

  // WMO weather interpretation codes -> [emoji, description]
  var WMO = {
    0:  ["☀️", "Clear sky"],
    1:  ["🌤️", "Mainly clear"],
    2:  ["⛅", "Partly cloudy"],
    3:  ["☁️", "Overcast"],
    45: ["🌫️", "Fog"],
    48: ["🌫️", "Rime fog"],
    51: ["🌦️", "Light drizzle"],
    53: ["🌦️", "Drizzle"],
    55: ["🌧️", "Heavy drizzle"],
    56: ["🌧️", "Freezing drizzle"],
    57: ["🌧️", "Freezing drizzle"],
    61: ["🌦️", "Light rain"],
    63: ["🌧️", "Rain"],
    65: ["🌧️", "Heavy rain"],
    66: ["🌧️", "Freezing rain"],
    67: ["🌧️", "Freezing rain"],
    71: ["🌨️", "Light snow"],
    73: ["🌨️", "Snow"],
    75: ["❄️", "Heavy snow"],
    77: ["❄️", "Snow grains"],
    80: ["🌦️", "Light showers"],
    81: ["🌧️", "Showers"],
    82: ["⛈️", "Violent showers"],
    85: ["🌨️", "Snow showers"],
    86: ["🌨️", "Snow showers"],
    95: ["⛈️", "Thunderstorm"],
    96: ["⛈️", "Storm with hail"],
    99: ["⛈️", "Storm with hail"]
  };
  function wmo(code) { return WMO[code] || ["🌡️", "Unknown"]; }

  var form = document.getElementById("form");
  var cityInput = document.getElementById("city");
  var statusEl = document.getElementById("status");
  var dash = document.getElementById("dash");

  function showStatus(html, isError) {
    dash.style.display = "none";
    statusEl.style.display = "block";
    statusEl.className = isError ? "error" : "";
    statusEl.innerHTML = html;
  }

  function showDash() {
    statusEl.style.display = "none";
    dash.style.display = "block";
  }

  function weekday(isoDate) {
    // Parse as local noon to dodge timezone edge cases on date-only strings.
    var d = new Date(isoDate + "T12:00:00");
    return ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"][d.getDay()];
  }

  function getJSON(url) {
    return fetch(url).then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    });
  }

  function render(placeName, data) {
    var cur = data.current;
    var w = wmo(cur.weather_code);
    document.getElementById("place").textContent = placeName;
    document.getElementById("nowGlyph").textContent = w[0];
    document.getElementById("nowTemp").textContent = Math.round(cur.temperature_2m);
    document.getElementById("nowDesc").textContent = w[1];

    var d = data.daily;
    var html = "";
    for (var i = 0; i < d.time.length && i < 5; i++) {
      var dw = wmo(d.weather_code[i]);
      html += '<div class="day">' +
        '<div class="wd">' + (i === 0 ? "Today" : weekday(d.time[i])) + "</div>" +
        '<div class="g">' + dw[0] + "</div>" +
        '<div class="hi">' + Math.round(d.temperature_2m_max[i]) + "&deg;</div>" +
        '<div class="lo">' + Math.round(d.temperature_2m_min[i]) + "&deg;</div>" +
        "</div>";
    }
    document.getElementById("days").innerHTML = html;
    showDash();
  }

  function lookup(city) {
    city = (city || "").trim();
    if (!city) return;
    showStatus('<span class="spin"></span><br>Finding ' + escapeHtml(city) + "…", false);

    getJSON(GEO_URL + encodeURIComponent(city))
      .then(function (geo) {
        if (!geo.results || !geo.results.length) {
          throw { noCity: true };
        }
        var hit = geo.results[0];
        var label = hit.name + (hit.country_code ? ", " + hit.country_code : "");
        return getJSON(FC_URL + "&latitude=" + hit.latitude + "&longitude=" + hit.longitude)
          .then(function (fc) {
            try { localStorage.setItem(STORE_KEY, city); } catch (e) { /* storage full/blocked */ }
            render(label, fc);
          });
      })
      .catch(function (err) {
        if (err && err.noCity) {
          showStatus("Couldn't find <b>" + escapeHtml(city) + "</b>.<br>Check the spelling and try again.", true);
        } else if (!navigator.onLine) {
          showStatus("You appear to be offline.<br>Reconnect and try again.", true);
        } else {
          showStatus("Couldn't reach the weather service.<br>Please try again in a moment.", true);
        }
      });
  }

  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    cityInput.blur();
    lookup(cityInput.value);
  });

  // Restore last city on launch.
  var last = null;
  try { last = localStorage.getItem(STORE_KEY); } catch (e) { /* ignore */ }
  if (last) {
    cityInput.value = last;
    lookup(last);
  }
})();
</script>
</body>
</html>
